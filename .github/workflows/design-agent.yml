name: Design Agent

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_url:
        description: "Issue to evaluate (e.g. FiloAI/filo-doc/issues/18 or just 5 for this repo)"
        required: true
        type: string

concurrency:
  group: design-agent-${{ github.event.issue.number || github.event.inputs.issue_url }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'design-review'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.DESIGN_AGENT_TOKEN }}

      - name: Resolve issue location
        id: issue
        env:
          GH_TOKEN: ${{ secrets.DESIGN_AGENT_TOKEN }}
          INPUT_URL: ${{ github.event.inputs.issue_url }}
          LOCAL_NUM: ${{ github.event.issue.number }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${INPUT_URL}"
            INPUT=$(echo "$INPUT" | sed 's|^https://github.com/||')
            if echo "$INPUT" | grep -qE '^[0-9]+$'; then
              REPO="${{ github.repository }}"
              NUM="$INPUT"
            else
              REPO=$(echo "$INPUT" | sed 's|/issues/.*||')
              NUM=$(echo "$INPUT" | grep -oE '[0-9]+$')
            fi
          else
            REPO="${{ github.repository }}"
            NUM="$LOCAL_NUM"
          fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

          ISSUE_DATA=$(gh api "repos/$REPO/issues/$NUM")
          TITLE=$(echo "$ISSUE_DATA" | jq -r .title)
          BODY=$(echo "$ISSUE_DATA" | jq -r .body)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          COMMENTS=$(gh api "repos/$REPO/issues/$NUM/comments" --jq '.[] | "### \(.user.login) (\(.created_at))\n\(.body)\n"')

          cat > /tmp/issue_context.md <<CTXEOF
          # Issue #$NUM from $REPO
          ## Title: $TITLE

          ## Body
          $BODY

          ## Comments
          $COMMENTS
          CTXEOF

      - name: Run Design Agent
        env:
          GH_TOKEN: ${{ secrets.DESIGN_AGENT_TOKEN }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Filo Design Agent. Your job is to evaluate proposed
            changes to Filo's design system and either approve them or push back.

            Read DESIGN-AGENT.md for your full operating rules.

            The issue context (title, body, and all comments) is in /tmp/issue_context.md — read it now.

            The issue is from repo: ${{ steps.issue.outputs.repo }}
            Issue number: #${{ steps.issue.outputs.number }}
            Issue title: "${{ steps.issue.outputs.title }}"

            Follow the evaluation workflow in DESIGN-AGENT.md exactly.

            IMPORTANT: When you need to comment on the issue, use:
              gh api repos/${{ steps.issue.outputs.repo }}/issues/${{ steps.issue.outputs.number }}/comments -f body="YOUR COMMENT"

            When you need to create a PR in filo-design, create it in this repo as usual.
          claude_args: "--max-turns 20"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read", "Edit", "Write", "Glob", "Grep",
                  "Bash(git *)", "Bash(gh *)", "Bash(cat *)"
                ]
              }
            }
