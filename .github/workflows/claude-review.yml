name: Claude Review Handler

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (leave empty for auto-detect)"
        required: false
        type: string
      since_minutes:
        description: "Look back N minutes for comments"
        required: false
        default: "120"
        type: string

env:
  REPO: FiloAI/filo-design
  PR_AUTHOR: zqchris
  POLL_WINDOW_MINUTES: 20

concurrency:
  group: claude-review-${{ github.event.inputs.pr_number || 'cron' }}
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_work: ${{ steps.detect.outputs.has_work }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FiloAI

      - name: Detect PRs with new review comments
        id: detect
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPO="${{ env.REPO }}"
          AUTHOR="${{ env.PR_AUTHOR }}"
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo 'matrix=[{"pr":${{ inputs.pr_number }},"since":${{ inputs.since_minutes || 120 }}}]' >> "$GITHUB_OUTPUT"
            echo "has_work=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SINCE="${{ env.POLL_WINDOW_MINUTES }}"
          CUTOFF=$(date -u -d "$SINCE minutes ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                   || date -u -v-${SINCE}M +%Y-%m-%dT%H:%M:%SZ)
          PRS=$(gh api "repos/$REPO/pulls?state=open&per_page=50" \
            --jq "[.[] | select(.user.login == \"$AUTHOR\") | .number]")
          if [ "$PRS" = "[]" ] || [ -z "$PRS" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          WORK="[]"
          for PR in $(echo "$PRS" | jq -r '.[]'); do
            NEW_COMMENTS=$(gh api "repos/$REPO/pulls/$PR/comments?since=$CUTOFF&per_page=5" \
              --jq "[.[] | select(.user.login != \"$AUTHOR\")] | length")
            NEW_ISSUE_COMMENTS=$(gh api "repos/$REPO/issues/$PR/comments?since=$CUTOFF&per_page=5" \
              --jq "[.[] | select(.user.login != \"$AUTHOR\")] | length")
            NEW_REVIEWS=$(gh api "repos/$REPO/pulls/$PR/reviews?per_page=10" \
              --jq "[.[] | select(.user.login != \"$AUTHOR\" and .submitted_at > \"$CUTOFF\")] | length")
            TOTAL=$((NEW_COMMENTS + NEW_ISSUE_COMMENTS + NEW_REVIEWS))
            if [ "$TOTAL" -gt 0 ]; then
              WORK=$(echo "$WORK" | jq ". + [{\"pr\": $PR, \"since\": $SINCE}]")
            fi
          done
          COUNT=$(echo "$WORK" | jq length)
          echo "matrix=$WORK" >> "$GITHUB_OUTPUT"
          [ "$COUNT" -gt 0 ] && echo "has_work=true" >> "$GITHUB_OUTPUT" || echo "has_work=false" >> "$GITHUB_OUTPUT"

  handle:
    needs: poll
    if: needs.poll.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.poll.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FiloAI

      - name: Get PR branch info
        id: pr-info
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_DATA=$(gh api "repos/${{ env.REPO }}/pulls/${{ matrix.pr }}" \
            --jq '{head_ref: .head.ref, title: .title}')
          echo "branch=$(echo "$PR_DATA" | jq -r .head_ref)" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_DATA" | jq -r .title)" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - name: Configure Git for private dependencies
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git+ssh://git@github.com:"
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"

      - name: Collect review comments
        id: reviews
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SINCE_MIN: ${{ matrix.since }}
          PR_NUM: ${{ matrix.pr }}
        run: |
          REPO="${{ env.REPO }}"
          PR=${{ matrix.pr }}
          gh api "repos/$REPO/pulls/$PR/comments" \
            --paginate --jq '.[] | {user: .user.login, path: .path, line: .line, body: .body, created_at: .created_at}' \
            > /tmp/all_comments.jsonl
          gh api "repos/$REPO/issues/$PR/comments" \
            --paginate --jq '.[] | {user: .user.login, path: "general", line: null, body: .body, created_at: .created_at}' \
            >> /tmp/all_comments.jsonl
          gh api "repos/$REPO/pulls/$PR/reviews" \
            --paginate --jq '.[] | select(.body != "") | {user: .user.login, path: "review", line: null, body: (.state + ": " + .body), created_at: .submitted_at}' \
            >> /tmp/all_comments.jsonl
          python3 << 'PYEOF2'
          import json, sys, os
          from datetime import datetime, timedelta, timezone
          since = int(os.environ.get("SINCE_MIN", "20"))
          cutoff = datetime.now(timezone.utc) - timedelta(minutes=since)
          skip_users = {"zqchris", "github-actions[bot]", "filoai-aiworkflow"}
          comments = []
          for line in open("/tmp/all_comments.jsonl"):
              line = line.strip()
              if not line: continue
              c = json.loads(line)
              created = datetime.fromisoformat(c["created_at"].replace("Z", "+00:00"))
              if created < cutoff: continue
              if c["user"] in skip_users: continue
              comments.append(c)
          if not comments:
              with open(os.environ["GITHUB_OUTPUT"], "a") as out: out.write("has_comments=false\n")
              sys.exit(0)
          pr = os.environ.get("PR_NUM", "?")
          p = os.path.join(os.environ.get("GITHUB_WORKSPACE", "."), "REVIEW_COMMENTS.md")
          with open(p, "w") as f:
              f.write(f"# Review comments on PR #{pr} ({len(comments)} comments)\n\n")
              f.write("For each actionable comment, read the relevant source file, understand the issue, and fix it.\n\n")
              for c in comments:
                  loc = f"{c['path']}:{c['line']}" if c["line"] else c["path"]
                  f.write(f"## {c['user']} @ {loc}\n{c['body']}\n\n")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out: out.write("has_comments=true\n")
          PYEOF2

      - name: Run Claude Code
        if: steps.reviews.outputs.has_comments == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the file REVIEW_COMMENTS.md in the repo root for code review
            feedback on PR #${{ matrix.pr }} ("${{ steps.pr-info.outputs.title }}").

            For each actionable comment:
            1. Read the relevant source file
            2. Understand and fix the issue
            3. Follow CLAUDE.md conventions if present

            After all fixes are complete:
            - Delete REVIEW_COMMENTS.md
            - Stage, commit, and push all changes
          claude_args: "--max-turns 30"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read", "Edit", "Write", "Glob", "Grep",
                  "Bash(git *)", "Bash(rm *)", "Bash(python3 *)"
                ]
              }
            }
