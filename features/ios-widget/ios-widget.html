<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiloMail - iOS Widget System</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Pro', 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; background: #f0f0f0; padding: 40px; -webkit-font-smoothing: antialiased; }

  :root { --c02:#22a0fb; --c06:#000; --c07:#707070; --c08:#d5d5d5; --c14:rgba(0,0,0,0.04); --c15:rgba(76,180,255,0.12); --bg-from:#fff; --bg-to:#e7f5ff; --cb-bg:#FCFAFA; --shadow:0px 2px 20px 0px rgba(0,0,0,0.08),0px 0px 0px 0.5px rgba(0,0,0,0.06); }
  .dark { --c02:#45b1ff; --c06:#fff; --c07:#8b8b8b; --c08:#414149; --c14:rgba(255,255,255,0.06); --c15:rgba(76,180,255,0.12); --bg-from:#252a30; --bg-to:#111418; --cb-bg:#2a2f36; }

  .page-header { text-align:center; margin-bottom:40px; }
  .page-header .sub { font-size:13px; color:#707070; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
  .page-header h1 { font-size:32px; font-weight:700; color:#000; margin-bottom:6px; }
  .page-header .sizes { font-size:15px; color:#999; }
  .theme-section { margin-bottom:60px; }
  .theme-section h2 { font-size:14px; color:#999; text-transform:uppercase; letter-spacing:1px; margin-bottom:24px; }
  .row { display:flex; gap:24px; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; }
  .row-lbl { font-size:12px; color:#aaa; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }

  .w { background:linear-gradient(to bottom,var(--bg-from) 1%,var(--bg-to) 99%); border-radius:22px; box-shadow:var(--shadow); overflow:hidden; flex-shrink:0; }
  .fh { display:flex; align-items:center; gap:4px; }
  .fl { font-size:13px; color:var(--c07); line-height:1.2; }
  .sg { display:flex; gap:12px; align-items:center; }
  .si { display:flex; align-items:center; gap:2px; }
  .si .n { font-size:16px; font-weight:700; color:var(--c02); line-height:1.3; letter-spacing:-0.2px; }
  .si .l { font-size:10px; color:var(--c07); line-height:1.2; }
  .ab { width:44px; height:44px; border-radius:16px; background:var(--c15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .dv { width:0.5px; background:var(--c08); flex-shrink:0; align-self:stretch; }
  .dh { width:100%; height:0.5px; background:var(--c08); flex-shrink:0; }

  /* SVG icon color via CSS */
  .ic svg { display:block; }
  .ic-b svg path { fill:var(--c02); }
  .ic-b svg path[stroke] { stroke:var(--c02); fill:none; }

  /* SMALL */
  .ws { width:170px; height:170px; padding:16px; position:relative; }
  .ws .fh { margin-bottom:16px; }
  .ws .acts { display:flex; flex-direction:column; gap:12px; }
  .ws .ar { display:flex; align-items:center; gap:8px; }
  .ws .as { display:flex; align-items:center; gap:4px; }
  .ws .as .n { font-size:28px; font-weight:700; color:var(--c02); line-height:1.3; letter-spacing:0.1px; }
  .ws .as .l { font-size:13px; color:var(--c07); line-height:1.2; }
  .ws .emp { font-size:15px; color:var(--c07); line-height:1.35; letter-spacing:-0.2px; text-align:center; position:absolute; top:63px; left:50%; transform:translateX(-50%); width:106px; }

  /* MEDIUM */
  .wm { width:364px; height:170px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .mh { display:flex; align-items:flex-start; justify-content:space-between; }
  .ca { display:flex; gap:12px; align-items:stretch; flex:1; min-height:0; }
  .ac { display:flex; flex-direction:column; justify-content:space-between; flex-shrink:0; }
  .lst { display:flex; flex-direction:column; gap:12px; flex:1; min-width:0; overflow:hidden; padding-top:2px; }
  .ti { display:flex; align-items:center; gap:8px; width:100%; }
  .tt { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .tx { font-size:13px; color:var(--c06); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .td { font-size:13px; color:var(--c07); line-height:1.2; white-space:nowrap; flex-shrink:0; }
  .ei { display:flex; gap:12px; align-items:flex-start; width:100%; }
  .ef { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
  .es { font-size:13px; font-weight:700; color:var(--c06); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ej { font-size:13px; color:var(--c07); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ed { font-size:13px; color:var(--c07); line-height:1.2; white-space:nowrap; flex-shrink:0; }
  .lst.el { gap:10px; padding-top:0; }
  .ec { display:flex; gap:32px; align-items:center; flex:1; }
  .etm { font-size:15px; color:var(--c07); line-height:1.35; letter-spacing:-0.2px; text-align:center; }

  /* LARGE */
  .wl { width:364px; height:382px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .lh { display:flex; align-items:flex-start; justify-content:space-between; }
  .cm { display:flex; flex-direction:column; gap:16px; flex:1; }
  .ag { display:flex; flex-direction:column; gap:8px; }
  .ap { display:flex; gap:8px; }
  .apc { flex:1; background:var(--c15); border-radius:16px; padding:8px 12px; display:flex; align-items:center; gap:8px; }
  .apc .cn { font-size:17px; font-weight:700; color:var(--c02); line-height:1.4; letter-spacing:-0.2px; }
  .apc .cl { font-size:10px; color:var(--c07); line-height:1.2; }
  .apc .ci { display:flex; flex-direction:column; }
  .as2 { display:flex; gap:8px; }
  .asc { flex:1; background:var(--c14); border-radius:16px; padding:10px 0; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .asc .sl { font-size:10px; color:var(--c07); line-height:1.2; }
  .ll { display:flex; flex-direction:column; gap:16px; flex:1; overflow:hidden; }
  .lel { display:flex; flex-direction:column; gap:12px; flex:1; overflow:hidden; }
  .ectr { flex:1; display:flex; flex-direction:column; align-items:center; gap:80px; }
  .emsg { font-size:15px; color:var(--c07); line-height:1.35; letter-spacing:-0.2px; text-align:center; }
</style>
</head>
<body>

<div class="page-header">
  <div class="sub">iOS Widget System</div>
  <h1>FiloMail</h1>
  <div class="sizes">Small &middot; Medium &middot; Large</div>

function icon(name, size, color) {
  const c = color || 'var(--c02)';
  let svg = ICONS[name] || '';
  svg = svg.replace(/fill="IC"/g, `fill="${c}"`);
  svg = svg.replace(/fill="CB"/g, `fill="${'var(--c08)'}"`);
  svg = svg.replace(/fill="BG"/g, `fill="${'var(--cb-bg)'}"`);
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
}

function filoHeader() {
  return `<div class="fh">${icon('filo',16)}<span class="fl">FILO SUMMARY</span></div>`;
}
function mailBtn() { return `<div class="ab">${icon('mail',20)}</div>`; }
function todoBtn() { return `<div class="ab">${icon('todo',20)}</div>`; }
function cbIcon() { return icon('cb',16); }
function statGroup(e,t) { return `<div class="sg"><div class="si"><span class="n">${e}</span><span class="l">Emails</span></div><div class="si"><span class="n">${t}</span><span class="l">To-dos</span></div></div>`; }

function todoItem(text, date) {
  return `<div class="ti"><div class="tt">${cbIcon()}<span class="tx">${text}</span></div>${date ? `<span class="td">${date}</span>` : ''}</div>`;
}
function emailItem(sender, subject, date) {
  return `<div class="ei"><div class="ef"><span class="es">${sender}</span><span class="ej">${subject}</span></div><span class="ed">${date}</span></div>`;
}

function largePrimary(emails, todos) {
  return `<div class="ap"><div class="apc">${icon('mail',16)}<div class="ci"><span class="cn">${emails}</span><span class="cl">Unread Emails</span></div></div><div class="apc">${icon('todo',16)}<div class="ci"><span class="cn">${todos}</span><span class="cl">To-dos</span></div></div></div>`;
}
function largeSecondary() {

}
